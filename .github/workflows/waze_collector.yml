# .github/workflows/waze_collector.yml
# ─────────────────────────────────────────────────────────────────
# Ejecuta el recolector de alertas Waze cada 3 horas.
# Guarda los resultados de forma incremental en data/*.json
# y hace commit automático al repo.
# ─────────────────────────────────────────────────────────────────

name: Waze Alerts Collector

on:
  schedule:
    # Cron UTC: cada 3 horas (00, 03, 06, 09, 12, 15, 18, 21)
    - cron: "0 */3 * * *"

  # Permite lanzarlo manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write   # necesario para hacer git push

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  

jobs:
  collect:
    name: Recolectar y persistir alertas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout con historial completo para poder hacer push
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Instalar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache eliminado: requería requirements.txt en el repo

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # 4. Crear carpeta data si no existe
      - name: Crear carpeta data
        run: mkdir -p data

      # 5. Ejecutar el colector
      #    Las API keys se leen desde los Secrets del repo
      - name: Ejecutar collector.py
        env:
          WAZE_PARTNER_URL:    ${{ secrets.WAZE_PARTNER_URL }}
          OPENWEBNINJA_API_KEY: ${{ secrets.OPENWEBNINJA_API_KEY }}
        run: python collector.py
        
      #    Las API keys se leen desde los Secrets del repo
      - name: Ejecutar collector_gdo.py
        env:
          WAZE_PARTNER_URL:    ${{ secrets.WAZE_PARTNER_URL_GDO }}
          OPENWEBNINJA_API_KEY: ${{ secrets.OPENWEBNINJA_API_KEY }}
        run: python collector_gdo.py


      # 6. Commit y push solo si hay cambios en data/
      - name: Commit cambios (si los hay)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f data/

          git status

          # Solo commitea si hay algo staged
          if git diff --cached --quiet; then
            echo "Sin cambios nuevos — nada que commitear."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore(data): actualización automática waze · ${TIMESTAMP}"
            git push
          fi
